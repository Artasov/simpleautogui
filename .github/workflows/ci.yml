name: CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version_check:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.compare.outputs.should_publish }}
      current_version: ${{ steps.compare.outputs.current_version }}
      previous_version: ${{ steps.compare.outputs.previous_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare package version
        id: compare
        shell: bash
        run: |
          current_version=$(python - <<'PY'
          import re
          from pathlib import Path

          content = Path("src/simpleautogui/_version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', content)
          if not match:
              raise SystemExit("Cannot find __version__ in src/simpleautogui/_version.py")
          print(match.group(1))
          PY
          )

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=" >> "$GITHUB_OUTPUT"
          echo "should_publish=false" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "push" ]; then
            exit 0
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/v}"
            if [ "$tag_version" != "$current_version" ]; then
              echo "Tag version $tag_version does not match package version $current_version" >&2
              exit 1
            fi

            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$GITHUB_REF" != "refs/heads/main" ] && [ "$GITHUB_REF" != "refs/heads/master" ]; then
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${before_sha}:src/simpleautogui/_version.py" 2>/dev/null; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version=$(git show "${before_sha}:src/simpleautogui/_version.py" | python -c 'import re, sys; content = sys.stdin.read(); match = re.search(r"__version__ = \"([^\"]+)\"", content); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("Cannot find __version__ in previous src/simpleautogui/_version.py")))')

          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "$previous_version" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Compile sources
        run: python -m compileall -q src tests

  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install -U pip build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && needs.version_check.outputs.should_publish == 'true'
    needs:
      - version_check
      - quality
      - test
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Show release version
        run: |
          echo "Publishing version ${{ needs.version_check.outputs.current_version }}"
          echo "Previous version: ${{ needs.version_check.outputs.previous_version }}"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
